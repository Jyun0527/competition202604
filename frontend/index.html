<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>植物療癒日記系統</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginPage">
  <h1>🌱 植物療癒日記</h1>
  <input id="username" placeholder="帳號">
  <div class="password-container">
    <input id="password" type="password" placeholder="密碼">
    <span class="eye-icon" onclick="togglePassword('password')">👁️</span>
  </div>
  <button onclick="login()">登入</button>
  <button onclick="openModal('registerModal')">註冊新帳號</button>
  <p id="loginMsg" style="color:red;"></p>
</div>

<div id="mainPage" class="hidden">
  <div id="worldListArea">
    <h2 id="welcome"></h2>
    <div class="topBar">
      <button onclick="openModal('guideModal')">📖 說明</button>
      <button onclick="openModal('plantModal')">➕ 建立新植物</button>
      <button onclick="logout()">🚪 登出</button>
    </div>
    <div id="plantList"></div> </div>

  <div id="detailView" class="hidden">
    <div class="topBar">
      <button onclick="backToWorlds()">⬅️ 回到列表</button>
      <h2 id="viewingPlantName" style="display:inline; margin-left:10px;">植物名稱</h2>
    </div>
    
    <div class="detail-card">
        <div id="plantStatusInfo"></div> <hr>
        <div class="action-buttons">
            <button onclick="openDiaryFromView()">₍ᐢ..ᐢ₎✎ 寫今日日記</button>
            <button onclick="openHistoryView()">📅 歷史紀錄</button>
            <button onclick="deleteCurrentPlant()" style="color:red">🗑️ 刪除植物</button>
            <button onclick="endPlanting()">🎋 結束種植</button>
        </div>
        <div id="latestDiaryInView"></div> </div>
  </div>
</div>

<div class="modal" id="guideModal">
  <div class="box">
    <h3>使用說明</h3>
    <p>🌱 新增植物 → 每天寫日記 → AI陪伴你</p>
    <p>📸 可上傳每日照片</p>
    <p>📅 可查看歷史紀錄</p>
    <button onclick="closeAllModal()">知道了</button>
  </div>
</div>

<div class="modal" id="registerModal">
  <div class="box">
    <h3>註冊新帳號</h3>
    <input id="regUsername" placeholder="帳號">
    <div class="password-container">
      <input id="regPassword" type="password" placeholder="設定密碼">
      <span class="eye-icon" onclick="togglePassword('regPassword')">👁️</span>
    </div>
    <div class="password-container">
      <input id="regConfirmPassword" type="password" placeholder="再次輸入密碼">
      <span class="eye-icon" onclick="togglePassword('regConfirmPassword')">👁️</span>
    </div>
    <button onclick="register()">確認註冊</button>
    <button onclick="closeAllModal()" style="background:#888;">取消</button>
    <p id="regMsg" style="color:red;"></p>
  </div>
</div>

<div class="modal" id="plantModal">
  <div class="box" style="text-align: left; max-height: 85vh; overflow-y: auto;">
    <h3 style="text-align: center;">🌱 新增植物與初始紀錄</h3>
    
    <label><b>植物名稱</b></label>
    <input id="plantName" placeholder="幫植物取個名字吧！" style="width: 100%; margin-bottom: 15px; padding: 8px; box-sizing: border-box;">
    
    <label><b>① 開始種植日期 ‼️</b></label>
    <input type="date" id="setupStartDate" style="width: 100%; margin-bottom: 15px; padding: 8px; box-sizing: border-box;">

    <label><b>② 今日澆水次數 💧</b></label>
    <select id="setupWater" style="width: 100%; margin-bottom: 15px; padding: 8px; box-sizing: border-box;">
      <option value="0次">0 次</option>
      <option value="1次">1 次</option>
      <option value="2次">2 次</option>
      <option value="3次">3 次</option>
    </select>

    <label><b>③ 植物外觀 (可複選) 🌿</b></label>
    <div style="margin-bottom: 15px; padding-left: 5px;">
      <label style="display: block; margin: 5px 0;"><input type="checkbox" class="setupAppearance" value="葉片發黃"> 葉片發黃</label>
      <label style="display: block; margin: 5px 0;"><input type="checkbox" class="setupAppearance" value="葉片枯萎"> 葉片枯萎</label>
      <label style="display: block; margin: 5px 0;"><input type="checkbox" class="setupAppearance" value="葉片斑點"> 葉片斑點</label>
      <label style="display: block; margin: 5px 0;"><input type="checkbox" class="setupAppearance" value="看起來健康"> 看起來健康</label>
    </div>

    <label><b>④ 是否開花 🌸</b></label>
    <div style="margin-bottom: 15px; padding-left: 5px;">
      <label style="margin-right: 15px;"><input type="radio" name="setupBloom" value="有"> 有</label>
      <label><input type="radio" name="setupBloom" value="沒有" checked> 沒有</label>
    </div>

    <label><b>⑤ 是否結果 🍅</b></label>
    <div style="margin-bottom: 15px; padding-left: 5px;">
      <label style="margin-right: 15px;"><input type="radio" name="setupFruit" value="有"> 有</label>
      <label><input type="radio" name="setupFruit" value="沒有" checked> 沒有</label>
    </div>

    <label><b>⑥ 生長進度 (可複選) 🌱</b></label>
    <div style="margin-bottom: 15px; padding-left: 5px;">
      <label style="display: block; margin: 5px 0;"><input type="checkbox" class="setupGrowth" value="葉片數五片以上"> 葉片數五片以上</label>
      <label style="display: block; margin: 5px 0;"><input type="checkbox" class="setupGrowth" value="發芽"> 發芽</label>
      <label style="display: block; margin: 5px 0;"><input type="checkbox" class="setupGrowth" value="都沒有"> 都沒有</label>
    </div>

    <label><b>⑦ 日照時間 ☀️</b></label>
    <select id="setupSun" style="width: 100%; margin-bottom: 20px; padding: 8px; box-sizing: border-box;">
      <option value="0~2小時">0~2 小時</option>
      <option value="3~5小時">3~5 小時</option>
      <option value="6小時以上">6 小時以上</option>
    </select>

    <button onclick="addPlant()" style="width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">確認新增</button>
    <button onclick="closeAllModal()" style="width: 100%; padding: 10px; margin-top: 10px; background: #888; color: white; border: none; border-radius: 5px; cursor: pointer;">取消</button>
  </div>
</div>

<div class="modal" id="diaryModal">
  <div class="box">
    <h3>今日紀錄</h3>

    <label>💧 今日澆水次數</label>
    <select id="diaryWater" style="width:100%; margin-bottom:10px; padding:8px;">
      <option value="0次">0 次</option>
      <option value="1次">1 次</option>
      <option value="2次">2 次</option>
      <option value="3次">3 次</option>
    </select>

    <label>🌿 植物外觀（可複選）</label>
    <div style="margin-bottom:10px; text-align:left;">
      <label style="display:block; margin:4px 0;"><input type="checkbox" class="diaryAppearance" value="葉片發黃"> 葉片發黃</label>
      <label style="display:block; margin:4px 0;"><input type="checkbox" class="diaryAppearance" value="葉片枯萎"> 葉片枯萎</label>
      <label style="display:block; margin:4px 0;"><input type="checkbox" class="diaryAppearance" value="葉片斑點"> 葉片斑點</label>
      <label style="display:block; margin:4px 0;"><input type="checkbox" class="diaryAppearance" value="看起來健康"> 看起來健康</label>
    </div>

    <label>🌸 是否開花</label>
    <div style="margin-bottom:10px; text-align:left;">
      <label style="margin-right:15px;"><input type="radio" name="diaryBloom" value="有"> 有</label>
      <label><input type="radio" name="diaryBloom" value="沒有" checked> 沒有</label>
    </div>

    <label>🍅 是否結果</label>
    <div style="margin-bottom:10px; text-align:left;">
      <label style="margin-right:15px;"><input type="radio" name="diaryFruit" value="有"> 有</label>
      <label><input type="radio" name="diaryFruit" value="沒有" checked> 沒有</label>
    </div>

    <label>🌱 生長進度（可複選）</label>
    <div style="margin-bottom:10px; text-align:left;">
      <label style="display:block; margin:4px 0;"><input type="checkbox" class="diaryGrowth" value="發芽"> 發芽</label>
      <label style="display:block; margin:4px 0;"><input type="checkbox" class="diaryGrowth" value="開花"> 開花</label>
      <label style="display:block; margin:4px 0;"><input type="checkbox" class="diaryGrowth" value="結果"> 結果</label>
      <label style="display:block; margin:4px 0;"><input type="checkbox" class="diaryGrowth" value="收成"> 收成</label>
      <label style="display:block; margin:4px 0;"><input type="checkbox" class="diaryGrowth" value="無明顯變化"> 無明顯變化</label>
    </div>

    <label>☀️ 日照時間</label>
    <select id="diarySun" style="width:100%; margin-bottom:10px; padding:8px;">
      <option value="0~2小時">0~2 小時</option>
      <option value="3~5小時">3~5 小時</option>
      <option value="6小時以上">6 小時以上</option>
    </select>

    <label>💬 今天想說的話</label>
    <textarea id="diaryText" placeholder="今天植物怎麼樣呢..."></textarea>

    <div style="margin: 10px 0; font-size: 0.9em;">
      <p id="weatherDisplay">載入天氣...</p>
      <select id="citySelect" onchange="getWeatherByCity()" style="display:none; margin: 5px auto; padding: 5px; border-radius: 5px;">
        <option value="">-- 手動選擇地區 --</option>
        <optgroup label="北部地區">
          <option value="25.03,121.56">台北市</option>
          <option value="25.01,121.46">新北市</option>
          <option value="24.99,121.30">桃園市</option>
          <option value="24.81,120.96">新竹市</option>
          <option value="24.83,121.01">新竹縣</option>
          <option value="25.12,121.73">基隆市</option>
          <option value="24.75,121.75">宜蘭縣</option>
        </optgroup>
        <optgroup label="中部地區">
          <option value="24.14,120.67">台中市</option>
          <option value="24.56,120.81">苗栗縣</option>
          <option value="24.05,120.51">彰化縣</option>
          <option value="23.90,120.68">南投縣</option>
          <option value="23.70,120.43">雲林縣</option>
        </optgroup>
        <optgroup label="南部地區">
          <option value="22.99,120.21">台南市</option>
          <option value="22.61,120.30">高雄市</option>
          <option value="23.48,120.44">嘉義市</option>
          <option value="23.45,120.25">嘉義縣</option>
          <option value="22.67,120.48">屏東縣</option>
        </optgroup>
        <optgroup label="東部及離島">
          <option value="23.97,121.60">花蓮縣</option>
          <option value="22.75,121.14">台東縣</option>
          <option value="23.56,119.56">澎湖縣</option>
          <option value="24.43,118.31">金門縣</option>
          <option value="26.15,119.92">連江縣(馬祖)</option>
        </optgroup>
      </select>
    </div>

    <input type="file" id="photo" accept="image/*">
    <button onclick="saveDiary()">儲存日記</button>
    <button onclick="closeAllModal()" style="background:#888;">關閉</button>
    <p id="aiReply"></p>
  </div>
</div>

<div class="modal" id="historyModal">
  <div class="box">
    <h3>歷史紀錄</h3>
    <input type="date" id="historyDate" onchange="loadHistory()">
    <div id="historyList"></div>
    <button onclick="closeAllModal()" style="margin-top:10px;">關閉</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
